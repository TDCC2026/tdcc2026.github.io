<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dropbox Redirect Handler</title>
</head>
<body>
  <h1>Dropbox OAuth Redirect</h1>
  <pre id="output"></pre>

  <script>
    // Parse ?code=...&state=... from the URL
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    const error = params.get("error");

    const output = document.getElementById("output");

    if (error) {
      output.textContent = "Error returned from Dropbox: " + error;
    } else if (code) {
      output.textContent =
        "Authorization code received from Dropbox:\n\n" +
        code +
        "\n\n(You now need to exchange this code for an access token on a server.)";
    } else {
      output.textContent = "No authorization code found in URL.";
    }
  </script>
</body>
</html>
